# Tunable parameters for the newspaper OCR pipeline.
# Every stage reads its parameters from here — no magic numbers in code.
# Verification thresholds used by PHASE_VERIFICATION_LOOP.md checks live under `verification`.

preprocessing:
  gaussian_kernel: 3          # odd kernel size for Gaussian blur (halftone smoothing); 5 wiped small body text on the real page (loop iter 1)
  threshold_method: otsu+adaptive   # otsu | adaptive | otsu+adaptive — global-only Otsu lost small body text (loop iters 1-2)
  adaptive_block_size: 31     # odd; local window for adaptive threshold
  adaptive_c: 10              # constant subtracted from local mean (higher = less noise)
  morph_open_kernel: 3        # square kernel for morphological opening (speck removal)
  morph_open_iterations: 1
  border_margin_px: 5         # components whose bbox touches within this margin of the page edge are cleared

layout:
  # Closing kernels (see layout.py: closing, not dilation, so boxes stay snug).
  # [40,1]/[1,20] merged the whole real page into one region (loop iter 1);
  # values below came from a coverage sweep against ground truth.
  horizontal_dilate_kernel: [10, 1]   # connect characters into lines (must stay < column gutter ~15px)
  vertical_dilate_kernel: [1, 8]      # merge lines into blocks
  closing_kernel: [9, 9]
  closing_iterations: 1
  display_pass:
    # Second detection pass at display-text scale: only connected components at
    # least min_component_height tall enter this mask (headline glyphs are
    # 30-95px vs ~8px body glyphs), so aggressive closing here merges headline
    # words/lines without fusing any body-scale regions. Boxes are unioned with
    # the fine-scale pass; filtering (stage 3) removes duplicates/nesting.
    enabled: true
    min_component_height: 26
    max_component_height: 120   # above this = photo/graphic blob, not a display glyph (over-merge fix, phase-3 loop)
    horizontal_close: [60, 1]
    vertical_close: [1, 20]
    # Chained-across-gutter boxes get split at near-inkless vertical bands of the
    # ORIGINAL binary (word gaps ~25-30px exceed gutters ~15px, so closing alone
    # can't avoid the chaining):
    gutter_min_px: 12
    gutter_max_ink_ratio: 0.02  # a column counts as blank if <=2% of its pixels are ink
    gutter_split_min_height: 150  # only boxes taller than one display line get split (a single line's word gaps are full-height blanks)

filtering:
  min_area_px: 4000           # discard regions smaller than this; smallest real region on the
                              # 1220x1490 test page is ~7200 px². NOTE: absolute pixels —
                              # resolution-dependent (KNOWN_ISSUES.md)
  max_area_ratio: 0.9         # discard regions covering more than this fraction of the page
  containment_threshold: 0.85 # a box this-much contained in another is considered nested → dropped

ocr:
  # Phase 4 (not yet implemented)
  psm: 6                      # Tesseract page segmentation: single uniform block
  oem: 1                      # LSTM engine
  lang: eng
  upscale_factor: 2.0         # bicubic upscale before OCR
  min_text_chars: 3           # post-OCR: drop regions with fewer characters than this
  min_word_confidence: 30     # post-OCR: garbage filter

verification:
  preprocessing:
    # Speckle check: connected components smaller than min_speckle_area_px are speckles.
    # Pass if speckles-per-megapixel is below max_speckle_per_mpx.
    min_speckle_area_px: 10
    max_speckle_per_mpx: 1500
    # Character-loss check: for each ground-truth text region, ink (foreground) pixels in the
    # preprocessed image must be at least min_ink_retention of a per-crop plain-Otsu baseline.
    min_ink_retention: 0.5
    max_lost_region_pct: 10   # at most this % of GT text regions may fail the retention check
  layout:
    min_iou: 0.5
    min_gt_coverage: 0.8      # ≥80% of GT regions matched with IoU ≥ min_iou
  filtering:
    region_count_tolerance: 0.2   # ±20% of GT article count
  ocr:
    word_accuracy_threshold: 0.70
